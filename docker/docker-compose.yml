services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file: ../.env
    ports:
      - "8080:8080"
    depends_on:
      - db

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

  runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    image: algo-trading-runtime:latest
    profiles: ["runtime"]   # build-only: never auto-started by `docker compose up`. Containers are spawned on-demand by the control plane (one per run).

volumes:
  postgres_data:
