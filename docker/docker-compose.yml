services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://algo:secret@db:5432/algo_trading
      RUNTIME_DATABASE_URL: postgresql://algo:secret@db:5432/algo_trading
      RUNTIME_NETWORK: docker_default
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: dev
    environment:
      API_URL: http://api:8080
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web/src:/app/src
      - ../apps/web/index.html:/app/index.html
    depends_on:
      - api

  runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    image: algo-trading-runtime:latest
    profiles: ["runtime"]   # build-only: never auto-started by `docker compose up`. Containers are spawned on-demand by the control plane (one per run).

volumes:
  postgres_data:
